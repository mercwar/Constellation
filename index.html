<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constellation</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #000000;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        overflow: hidden;
    }

    /* Gold ambient glow */
    body::before {
        content: "";
        position: absolute;
        width: 700px;
        height: 700px;
        background: radial-gradient(circle, rgba(255,215,0,0.12), transparent 70%);
        filter: blur(90px);
        z-index: -1;
        animation: goldPulse 7s ease-in-out infinite alternate;
    }

    @keyframes goldPulse {
        from { opacity: 0.4; transform: scale(1); }
        to   { opacity: 0.8; transform: scale(1.15); }
    }

    .menu-container {
        width: 340px;
        height: 480px;
        padding: 30px 25px;
        border-radius: 10px;
		
        background: rgba(0, 0, 0, 0.65);
        backdrop-filter: blur(10px);

        border: 2px solid rgba(255, 215, 0, 0.35);
        box-shadow: 0 0 25px rgba(255, 215, 0, 0.25);

        display: flex;
        flex-direction: column;
        align-items: center;

        background-image: url('https://raw.githubusercontent.com/mercwar/Robo-Knight-Gallery/refs/heads/main/Version%206/image_af28b3aa.png');
        background-size: cover;
        background-position: center;
        background-blend-mode: overlay;
    }

    .menu-header {
	margin-top:100px;
        color: #ffd700;
        font-size: 26px;
        font-weight: 700;
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-bottom: 25px;
        text-shadow: 0 0 12px rgba(255, 215, 0, 0.9);
    }

    .menu-scroller-placeholder {
        width: 100%;
        flex-grow: 1;
        overflow-y: auto;
        padding-right: 6px;
    }

    .menu-scroller-placeholder::-webkit-scrollbar {
        width: 6px;
    }
    .menu-scroller-placeholder::-webkit-scrollbar-thumb {
        background: linear-gradient(#ffd700, #b8860b);
        border-radius: 3px;
    }

    .menu-btn {
        margin-bottom: 16px;
        border-radius: 8px;
        border: 1px solid rgba(255, 215, 0, 0.55);
        background: rgba(0, 0, 0, 0.55);
        transition: 0.25s ease;
    }

    .menu-btn:hover {
        background: rgba(255, 215, 0, 0.15);
        box-shadow: 0 0 18px rgba(255, 215, 0, 0.55);
        transform: translateY(-2px);
    }

    .text-link {
        display: block;
        padding: 15px;
        text-align: center;
        text-decoration: none;
        color: #ffd700;
        font-weight: 600;
        letter-spacing: 1px;
        font-size: 15px;
        text-shadow: 0 0 6px rgba(255, 215, 0, 0.4);
    }
</style>
</head>

<body>

<div class="menu-container">
    <div class="menu-header">Constellation</div>

    <div class="menu-scroller-placeholder">

        <div class="menu-btn">
            <a href="fire-star/index.html" class="text-link">Fire-Star</a>
        </div>

        <div class="menu-btn">
            <a href="#" class="text-link">Ice-Star</a>
        </div>

        <div class="menu-btn">
            <a href="#" class="text-link">Void-Star</a>
        </div>

        <div class="menu-btn">
            <a href="#" class="text-link">Nova-Core</a>
        </div>

    </div>
</div>

</body>
</html>
