<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mercwar AI Portal</title>

<link rel="stylesheet" href="css/index.css?v=28"/>
<link rel="stylesheet" href="css/rru_gx.css?v=28">

<!-- ============================================================
     SYNTHETIC ACTIVEX FOR OPERA GX
============================================================ -->
<script>
// Fake ActiveX API for Opera GX
window.AIFVS = window.AIFVS || {};

AIFVS.Tree = class {
    constructor() {
        console.log("AIFVS.Tree object created (Opera GX mode)");
    }

    LoadWindow() {
        console.log("LoadWindow() called — Opera GX synthetic handler");
        // Replace this with your DLL bridge, WebSocket, or local endpoint
        fetch("/cdrop/launch_window")
            .then(r => r.text())
            .then(t => console.log("Window launched:", t))
            .catch(err => console.error("Launch failed:", err));
    }
};

// Drop‑in replacement for ActiveXObject
function ActiveXObject(name) {
    if (name === "AIFVS.Tree") {
        return new AIFVS.Tree();
    }
    throw new Error("Unknown ActiveXObject: " + name);
}
</script>

</head>

<body>
<main class="screen">
<section class="centerpiece">

<div id="gx-banner">
  <span><i>Welcome to the gateway, next uplink Mercwar AI Portal</i></span>
</div>

<div class="center-inner">

<div class="menu-group">
  <button class="rk-btn" type="button" onclick="summonToolWindow();">
      Joe Tron's Avis News Gate
  </button>
</div>

<div style="display:flex; align-items:center; gap:12px; margin-left:30px;">
    <label class="rkGlow" title="[1] Keep in Frame [2] No New Browser">
        <input type="checkbox" id="keepInFrame" onchange="saveUplinkState(this.checked);">
        Up-link Window
    </label>

    <label class="rkGlow" title="[1] Use as Sidebar [x] Disabled in Frame">
        <input type="checkbox" id="pinSidebarChk" onchange="handleSidebarPinChange(this.checked)">
        Pin Sidebar
    </label>
</div>

<div class="menu-group has-dropdown">
  <button class="rk-btn dropdown-toggle">
  CONSTELLATION <span class="caret"></span>
  </button>
  <div class="dropdown">
    <div id="github-browser">
        <div class="menu-group has-dropdown">
            <div class="dropdown" id="repo-drop"></div>
        </div>
        <div id="constellation-menu"></div>
        <div id="tool-window" class="tool-window"></div>
    </div>
  </div>
</div>

<div class="menu-group has-dropdown" id="header-placeholder">
<button class="rk-btn dropdown-toggle">
SYSTEM HUB <span class="caret"></span>
</button>
<div class="dropdown" id="hub-drop"></div>
</div>

<div class="menu-group has-dropdown">
    <button class="rk-btn dropdown-toggle">
        Mercwar Portal Systems
        <span class="caret"></span>
    </button>
    <div class="dropdown" id="portal-drop"></div>
</div>

<label class="rk-check">
    <input style="margin-left:50px;" type="checkbox" id="keepGatewayActive" onchange="handleGatewayActiveChange(this.checked)">
    <span>Active Gate & Keep</span>
</label>

<div class="status-line" onclick="restoreToConsole()" style="cursor:pointer">
  Restore Console (Un-Pin)
</div>

</section>
<!-- This syntax ONLY functions in legacy Internet Explorer environments -->


<script>
printAjaxHTML("hub.html?v=4", "#hub-drop");
printAjaxHTML("portal.html?v=4", "#portal-drop");
printAjaxHTML("repo.html?v=4", "#repo-drop");
</script>

<script src="js/index.js?v=69"></script>
<script src="js/index1.js?v=69"></script>

<script>
document.getElementById("gx-banner").addEventListener("click", () => {
    launchPortal("https://roborook.fanclub.rocks");
});
</script>

</main>
