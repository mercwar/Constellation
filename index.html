<!-- GITHUB USER HYDRATION SCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", function() {

    function log(msg) {
        document.getElementById("ajax-log").innerHTML += msg + "<br>";
    }

    log("🔥 AJAX STARTED…");

    const targetUrl = "https://roborook.fanclub.rocks/RRU-AI/LOGIN/REG/github-csv-users.php";
    const proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(targetUrl);

    fetch(proxyUrl)
        .then(r => {
            log("🔥 RESPONSE OBJECT RECEIVED FROM PROXY");
            return r.json();
        })
        .then(proxyData => {
            const txt = proxyData.contents;

            log("🔥 RAW SERVER RESPONSE TEXT:");
            log("<pre>" + txt + "</pre>");

            let data;
            try {
                data = JSON.parse(txt);
            } catch (e) {
                log("❌ JSON PARSE FAILED: " + e);
                return;
            }

            log("🔥 PARSED JSON:");
            log("<pre>" + JSON.stringify(data, null, 2) + "</pre>");

            if (!data.users) {
                log("⚠ NO USERS ARRAY FOUND");
                return;
            }

            let sel = document.getElementById("github-username");

            log("🔥 HYDRATING SELECT WITH " + data.users.length + " USERS");

            data.users.forEach(u => {
                log("➡ ADDING OPTION: " + u);
                let opt = document.createElement("option");
                opt.value = u;
                opt.textContent = u;
                opt.dataset.dynamic = "1";
                sel.appendChild(opt);
            });

            log("✅ HYDRATION COMPLETE");
        })
        .catch(err => {
            log("❌ AJAX ERROR: " + err);
        });

});
</script>
