<!DOCTYPE html>

<body>
<div id="mwai"></div>
<main class="screen">
<section class="centerpiece">

<div id="gx-banner">
  <span><i>Welcome to the gateway, next uplink Mercwar AI Portal</i></span>
</div>

<div class="center-inner">

<div class="menu-group">
  <button class="rk-btn" type="button" onclick="summonToolWindow();">
      Joe Tron's Avis News Gate
  </button>
</div>

<div style="display:flex; align-items:center; gap:12px; margin-left:30px;">
    <label class="rkGlow">
        <input type="checkbox" id="keepInFrame" onchange="saveUplinkState(this.checked);">
        Up-link Window
    </label>

    <label class="rkGlow">
        <input type="checkbox" id="pinSidebarChk" onchange="handleSidebarPinChange(this.checked)">
        Pin Sidebar
    </label>
</div>

<div class="menu-group has-dropdown">
  <button class="rk-btn dropdown-toggle">
  CONSTELLATION <span class="caret"></span>
  </button>
  <div class="dropdown">
    <div id="github-browser">
        <div class="menu-group has-dropdown">
            <div class="dropdown" id="repo-drop"></div>
        </div>
        <div id="constellation-menu"></div>
        <div id="tool-window" class="tool-window"></div>
    </div>
  </div>
</div>

<div class="menu-group has-dropdown" id="header-placeholder">
<button class="rk-btn dropdown-toggle">
SYSTEM HUB <span class="caret"></span>
</button>
<div class="dropdown" id="hub-drop"></div>
</div>

<div class="menu-group has-dropdown">
    <button class="rk-btn dropdown-toggle">
        Mercwar Portal Systems
        <span class="caret"></span>
    </button>
    <div class="dropdown" id="portal-drop"></div>
</div>

<label class="rk-check">
    <input style="margin-left:50px;" type="checkbox" id="keepGatewayActive" onchange="handleGatewayActiveChange(this.checked)" checked>
    <span>Link Active Gate</span>
</label>

<div class="status-line" onclick="restoreToConsole()" style="cursor:pointer">
  Restore Console (Un-Pin)
</div>
<a href="index.html" target="_self" >
<div class="status-line" style="cursor:pointer">
  
   Stuck Gate? (Un-Stick)
</div></a>

</section>

<!-- LOG AREA -->
<div id="ajax-log" style="color:#ff4444; font-family:Consolas; margin-top:10px;"></div>

<script>
printAjaxHTML("hub.html?v=19", "#hub-drop");
printAjaxHTML("portal.html?v=23", "#portal-drop");
printAjaxHTML("repo.html?v=24", "#repo-drop");
</script>

<script src="js/index.js?v=161"></script>
<script src="js/index1.js?v=87"></script>

<script>
document.getElementById("gx-banner").addEventListener("click", () => {
    launchPortal("https://mercwar01.byethost3.com");
});
handleGatewayActiveChange(true);
</script>

</main>

<script>
const getTargetUrl = (address) => {
    const d = new Date();
    const pad = (n) => String(n).padStart(2, '0');
    const dt = `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}_${pad(d.getHours())}-${pad(d.getMinutes())}-${pad(d.getSeconds())}`;
    return `${address}?dt=${dt}`;
};

document.addEventListener("DOMContentLoaded", function() {
    function log(msg) {
        const logArea = document.getElementById("ajax-log");
        if (logArea) logArea.innerHTML += msg + "<br>";
    }

    function FillBox(target = "CSV/constellation.csv") {
        const targetUrl = getTargetUrl(target);

        fetch(targetUrl)
            .then(r => r.text())
            .then(txt => {
                const lines = txt.split(/\r?\n/).filter(l => l.trim() !== "");
                let users = [];

                lines.forEach(line => {
                    const parts = line.split(",");
                    if (parts.length === 2) {
                        const github = parts[1].trim();
                        if (github !== "" && !users.includes(github)) {
                            users.push(github);
                        }
                    }
                });

                const sel = document.getElementById("github-username");
                if (!sel) return;

                users.forEach(u => {
                    let opt = document.createElement("option");
                    opt.value = u;
                    opt.textContent = u;
                    opt.dataset.dynamic = "1";
                    sel.appendChild(opt);
                });
            })
            .catch(err => {
                log("❌ AJAX ERROR: " + err);
            });
    }

    // Run hydration on DOM ready
    FillBox();
});
</script>



</body>
</html>
