<script>

const getTargetUrl = (address) => {
    const d = new Date();
    const pad = (n) => String(n).padStart(2, '0');
    const dt = `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}_${pad(d.getHours())}-${pad(d.getMinutes())}-${pad(d.getSeconds())}`;
    return `${address}?dt=${dt}`;
};


document.addEventListener("DOMContentLoaded", function() {



    function log(msg) {
        document.getElementById("ajax-log").innerHTML += msg + "<br>";
    }
	
const targetUrl = getTargetUrl("CSV/constellation.csv");



  /// log("🔥 AJAX STARTED…");

   // const targetUrl = "../../../RRU-AI/LOGIN/REG/CSV/constellation.csv";

    fetch(targetUrl)
        .then(r => r.text())
        .then(txt => {

         //  log("🔥 RAW CSV RESPONSE:");
         //   log("<pre>" + txt.replace(/</g, "&lt;") + "</pre>");

            
            const lines = txt.split(/\r?\n/).filter(l => l.trim() !== "");

            let users = [];

            lines.forEach(line => {
                const parts = line.split(",");
                if (parts.length === 2) {
                    const github = parts[1].trim();
                    if (github !== "" && !users.includes(github)) {
                        users.push(github);
                    }
                }
            });

         //  log("🔥 PARSED USERS:");
         //  log("<pre>" + JSON.stringify(users, null, 2) + "</pre>");

            let sel = document.getElementById("github-username");

         //  log("🔥 HYDRATING SELECT WITH " + users.length + " USERS");

            users.forEach(u => {
          //     log("➡ ADDING OPTION: " + u);
                let opt = document.createElement("option");
                opt.value = u;
                opt.textContent = u;
                opt.dataset.dynamic = "1";
                sel.appendChild(opt);
            });

        //   log("✅ HYDRATION COMPLETE");
        })
        .catch(err => {
            log("❌ AJAX ERROR: " + err);
        });

});
</script>


</body>
</html>
